services:
  postgres:
    image: postgres:17-alpine
    container_name: jobradar-postgres
    environment:
      POSTGRES_USER: jobradar
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: jobradar_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jobradar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
