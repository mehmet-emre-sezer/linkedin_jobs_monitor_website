<svg viewBox="0 0 480 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Arka plan -->
  <rect width="480" height="600" fill="#080e1f"/>

  <!-- Glow top-right -->
  <ellipse cx="420" cy="80" rx="160" ry="160" fill="#2563eb" fill-opacity="0.12"/>
  <!-- Glow bottom-left -->
  <ellipse cx="60" cy="520" rx="140" ry="140" fill="#4f46e5" fill-opacity="0.10"/>
  <!-- Glow center -->
  <ellipse cx="240" cy="300" rx="100" ry="100" fill="#1d4ed8" fill-opacity="0.07"/>


  <!-- === JOB CARD 1 (en üstte, gri - düşük skор) === -->
  <rect x="40" y="60" width="260" height="76" rx="12" fill="#0f1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="56" y="78" width="80" height="8" rx="4" fill="#1e3a5f"/>
  <rect x="56" y="94" width="120" height="6" rx="3" fill="#152338"/>
  <rect x="56" y="108" width="60" height="5" rx="2.5" fill="#152338"/>
  <!-- Skor badge — düşük -->
  <rect x="268" y="78" width="18" height="18" rx="5" fill="#1a1a2e"/>
  <text x="277" y="91" text-anchor="middle" font-size="7" fill="#4b5563" font-family="monospace" font-weight="600">42</text>
  <!-- X işareti -->
  <circle cx="310" cy="98" r="10" fill="#1f1515"/>
  <line x1="305" y1="93" x2="315" y2="103" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="315" y1="93" x2="305" y2="103" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>

  <!-- === JOB CARD 2 (ortada, gri - düşük skor) === -->
  <rect x="40" y="156" width="260" height="76" rx="12" fill="#0f1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <rect x="56" y="174" width="100" height="8" rx="4" fill="#1e3a5f"/>
  <rect x="56" y="190" width="80" height="6" rx="3" fill="#152338"/>
  <rect x="56" y="204" width="50" height="5" rx="2.5" fill="#152338"/>
  <rect x="268" y="174" width="18" height="18" rx="5" fill="#1a1a2e"/>
  <text x="277" y="187" text-anchor="middle" font-size="7" fill="#4b5563" font-family="monospace" font-weight="600">58</text>
  <circle cx="310" cy="194" r="10" fill="#1f1515"/>
  <line x1="305" y1="189" x2="315" y2="199" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="315" y1="189" x2="305" y2="199" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Ok aşağı -->
  <line x1="160" y1="252" x2="160" y2="278" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="155,276 160,284 165,276" fill="#1e3a5f"/>

  <!-- === JOB CARD 3 (öne çıkan, mavi çerçeve — yüksek skor) === -->
  <rect x="40" y="290" width="300" height="88" rx="14" fill="#0d1f3c" stroke="#2563eb" stroke-width="1.5"/>
  <!-- Parlama efekti -->
  <rect x="40" y="290" width="300" height="88" rx="14" fill="url(#cardGlow)" opacity="0.3"/>
  <defs>
    <linearGradient id="cardGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- İlan başlığı -->
  <text x="58" y="314" font-size="11" fill="#ffffff" font-family="system-ui, sans-serif" font-weight="600">Junior ML Engineer</text>
  <text x="58" y="330" font-size="9" fill="#64748b" font-family="system-ui, sans-serif">Teknoloji A.Ş. · İstanbul (Hibrit)</text>
  <text x="58" y="348" font-size="8.5" fill="#334155" font-family="system-ui, sans-serif">Python, scikit-learn · 0–2 yıl deneyim</text>
  <!-- Skor badge — yüksek -->
  <rect x="290" y="306" width="34" height="20" rx="6" fill="#1e3a5f"/>
  <text x="307" y="320" text-anchor="middle" font-size="9" fill="#60a5fa" font-family="monospace" font-weight="700">87</text>
  <!-- Tik işareti -->
  <circle cx="318" cy="350" r="10" fill="#052e16"/>
  <polyline points="313,350 317,354 324,346" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Ok aşağı — ince çizgi -->
  <line x1="190" y1="388" x2="190" y2="414" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="185,412 190,420 195,412" fill="#2563eb"/>

  <!-- === TELEGRAM BİLDİRİMİ === -->
  <rect x="80" y="428" width="250" height="90" rx="16" fill="#0f1a2e" stroke="#1e3a5f" stroke-width="1"/>
  <!-- Telegram mavi top -->
  <circle cx="102" cy="450" r="12" fill="#2563eb"/>
  <text x="102" y="455" text-anchor="middle" font-size="11" fill="white">✈</text>
  <!-- Mesaj içeriği -->
  <text x="122" y="447" font-size="9" fill="#60a5fa" font-family="system-ui, sans-serif" font-weight="600">JobRadar Bot</text>
  <text x="122" y="460" font-size="8" fill="#94a3b8" font-family="system-ui, sans-serif">🆕 Yeni ilan — 87 puan</text>
  <text x="100" y="480" font-size="8" fill="#475569" font-family="system-ui, sans-serif">Junior ML Engineer · Teknoloji A.Ş.</text>
  <text x="100" y="496" font-size="7.5" fill="#2563eb" font-family="system-ui, sans-serif">İlana git →</text>

  <!-- Alt etiket -->
  <text x="240" y="570" text-anchor="middle" font-size="10" fill="#1e3a5f" font-family="system-ui, sans-serif">Günde 3 kez · otomatik · puanlanmış</text>
</svg>
